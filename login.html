<html lang="id"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Villa Impian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="container py-5">
    <div class="text-center mb-4">
        <a href="index.html" class="text-success text-decoration-none fs-3 fw-bold">
            <i class="bi bi-house-heart-fill"></i> Villa Impian
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card border-0 shadow-lg overflow-hidden">
                <div class="row g-0">
                    <div class="col-md-6 d-none d-md-block auth-image">
                        <div class="p-5 text-white h-100 d-flex flex-column justify-content-center">
                            <h2 class="fw-bold">Selamat Datang!</h2>
                            <p>Masuk untuk menemukan villa impian Anda dan nikmati pengalaman liburan terbaik.</p>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card-body p-5">
                            <ul class="nav nav-pills nav-fill mb-4" id="authTab" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#loginTab" aria-selected="true" role="tab">Login</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#registerTab" aria-selected="false" role="tab" tabindex="-1">Register</button>
                                </li>
                            </ul>

                            <div class="tab-content">
                                <div class="tab-pane fade active show" id="loginTab" role="tabpanel">
                                    <h4 class="fw-bold mb-4">Masuk ke Akun</h4>
                                    <form id="loginForm" novalidate="">
                                        <div class="mb-3">
                                            <label class="form-label">Email</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                                <input type="email" id="loginEmail" class="form-control" placeholder="email@example.com" required="">
                                                <div class="invalid-feedback">Email tidak valid</div>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required="">
                                                <button type="button" class="btn btn-outline-secondary toggle-password">
                                                    <i class="bi bi-eye"></i>
                                                </button>
                                                <div class="invalid-feedback">Password wajib diisi</div>
                                            </div>
                                        </div>
                                        <div class="d-flex justify-content-between mb-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="remember">
                                                <label class="form-check-label small" for="remember">Ingat saya</label>
                                            </div>
                                            <a href="#" class="small text-success text-decoration-none">Lupa password?</a>
                                        </div>
                                        <button type="submit" class="btn btn-success w-100 btn-lg">
                                            <i class="bi bi-box-arrow-in-right"></i> Login
                                        </button>
                                    </form>
                                </div>

                                <div class="tab-pane fade" id="registerTab" role="tabpanel">
                                    <h4 class="fw-bold mb-4">Buat Akun Baru</h4>
                                    <form id="registerForm" novalidate="">
                                        <div class="mb-3">
                                            <label class="form-label">Nama Lengkap</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                                <input type="text" id="regName" class="form-control" placeholder="Nama Anda" required="">
                                                <div class="invalid-feedback">Nama wajib diisi</div>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Email</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                                <input type="email" id="regEmail" class="form-control" placeholder="email@example.com" required="">
                                                <div class="invalid-feedback">Email tidak valid</div>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                                <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 karakter" required="" minlength="6">
                                                <button type="button" class="btn btn-outline-secondary toggle-password">
                                                    <i class="bi bi-eye"></i>
                                                </button>
                                                <div class="invalid-feedback">Password min. 6 karakter</div>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-success w-100 btn-lg">
                                            <i class="bi bi-person-plus"></i> Daftar
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body></html>
